name: Warm Rust Cache

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'src-tauri/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/cache-warm.yml'

permissions:
  contents: read

jobs:
  warm-cache:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-release-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            rust-release-

      - name: Build Rust dependencies only
        working-directory: src-tauri
        run: cargo check --release
