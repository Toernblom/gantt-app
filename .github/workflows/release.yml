name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog
        id: changelog
        shell: pwsh
        run: |
          $content = Get-Content CHANGELOG.md -Raw
          # Match first ## section (everything between first ## and second ##)
          if ($content -match '(?s)## [^\r\n]+\r?\n(.*?)(?=\r?\n## |\z)') {
            $body = $Matches[1].Trim()
          } else {
            $body = "Bug fixes and improvements."
          }
          # Write to GitHub output using delimiter
          $delimiter = "EOF_$(Get-Random)"
          "BODY<<$delimiter" >> $env:GITHUB_OUTPUT
          $body >> $env:GITHUB_OUTPUT
          $delimiter >> $env:GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: tauri-build
          save-if: true

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Gantt App ${{ github.ref_name }}'
          releaseBody: ${{ steps.changelog.outputs.BODY }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
